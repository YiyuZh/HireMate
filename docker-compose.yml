services:
  hiremate:
    build: .
    container_name: hiremate
    restart: unless-stopped
    volumes:
      - hiremate_data:/app/data
    environment:
      HIREMATE_DB_PATH: /app/data/hiremate.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}

  caddy:
    image: caddy:2
    container_name: hiremate-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - hiremate

volumes:
  hiremate_data:
  caddy_data:
  caddy_config:
