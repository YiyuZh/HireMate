services:
  mysql:
    image: mysql:8.4
    container_name: hiremate-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${HIREMATE_MYSQL_DATABASE:-hiremate}
      MYSQL_USER: ${HIREMATE_MYSQL_USER:-hiremate}
      MYSQL_PASSWORD: ${HIREMATE_MYSQL_PASSWORD:-hiremate_pwd}
      MYSQL_ROOT_PASSWORD: ${HIREMATE_MYSQL_ROOT_PASSWORD:-hiremate_root_pwd}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - hiremate_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${HIREMATE_MYSQL_ROOT_PASSWORD:-hiremate_root_pwd}"]
      interval: 10s
      timeout: 5s
      retries: 12

  hiremate:
    build:
      context: .
      args:
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-mirrors.tuna.tsinghua.edu.cn}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    container_name: hiremate
    restart: unless-stopped
    volumes:
      - hiremate_data:/app/data
    expose:
      - "8501"
    environment:
      HIREMATE_DB_BACKEND: mysql
      HIREMATE_MYSQL_HOST: mysql
      HIREMATE_MYSQL_PORT: 3306
      HIREMATE_MYSQL_USER: ${HIREMATE_MYSQL_USER:-hiremate}
      HIREMATE_MYSQL_PASSWORD: ${HIREMATE_MYSQL_PASSWORD:-hiremate_pwd}
      HIREMATE_MYSQL_DATABASE: ${HIREMATE_MYSQL_DATABASE:-hiremate}
      HIREMATE_MYSQL_CHARSET: utf8mb4
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy

  caddy:
    image: caddy:2
    container_name: hiremate-caddy
    restart: unless-stopped
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?Set CADDY_ACME_EMAIL in .env}
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:?Set PRIMARY_DOMAIN in .env}
      HIREMATE_DOMAIN: ${HIREMATE_DOMAIN:?Set HIREMATE_DOMAIN in .env}
      INTERVIEW_DOMAIN: ${INTERVIEW_DOMAIN:?Set INTERVIEW_DOMAIN in .env}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:?Set ADMIN_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
        bind:
          create_host_path: false
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - hiremate
    networks:
      - default
      - shared_gateway

volumes:
  hiremate_data:
    name: ${HIREMATE_DATA_VOLUME_NAME:-hiremate_hiremate_data}
  hiremate_mysql_data:
    name: ${HIREMATE_MYSQL_VOLUME_NAME:-hiremate_hiremate_mysql_data}
  caddy_data:
    name: ${HIREMATE_CADDY_DATA_VOLUME_NAME:-hiremate_caddy_data}
  caddy_config:
    name: ${HIREMATE_CADDY_CONFIG_VOLUME_NAME:-hiremate_caddy_config}

networks:
  shared_gateway:
    external: true
    name: ${SHARED_CADDY_NETWORK:-shared_gateway}
