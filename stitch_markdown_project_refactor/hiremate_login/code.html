<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HireMate - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#001b3d",
                        "outline": "#74777f",
                        "on-secondary-fixed": "#0b1c30",
                        "surface-tint": "#465f88",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#d3e4fe",
                        "primary": "#002046",
                        "on-secondary-container": "#54647a",
                        "surface": "#f6fafe",
                        "surface-container-high": "#e4e9ed",
                        "tertiary-fixed-dim": "#89ceff",
                        "surface-container-low": "#f0f4f8",
                        "on-secondary": "#ffffff",
                        "secondary": "#505f76",
                        "secondary-container": "#d0e1fb",
                        "outline-variant": "#c4c6cf",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "background": "#f6fafe",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#44474e",
                        "primary-fixed": "#d6e3ff",
                        "on-tertiary-container": "#1ba9ed",
                        "inverse-primary": "#aec7f7",
                        "tertiary": "#002336",
                        "surface-container-highest": "#dfe3e7",
                        "on-surface": "#171c1f",
                        "surface-bright": "#f6fafe",
                        "on-background": "#171c1f",
                        "surface-container": "#eaeef2",
                        "surface-dim": "#d6dade",
                        "inverse-on-surface": "#edf1f5",
                        "surface-variant": "#dfe3e7",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "on-tertiary-fixed": "#001e2f",
                        "error-container": "#ffdad6",
                        "primary-container": "#1b365d",
                        "tertiary-fixed": "#c9e6ff",
                        "on-primary-container": "#87a0cd",
                        "primary-fixed-dim": "#aec7f7",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-primary-fixed-variant": "#2e476f",
                        "inverse-surface": "#2c3134",
                        "on-secondary-fixed-variant": "#38485d",
                        "tertiary-container": "#003a55"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="w-full max-w-[1000px] grid grid-cols-1 md:grid-cols-2 bg-surface-container-lowest rounded-xl shadow-[0_4px_40px_rgba(23,28,31,0.06)] overflow-hidden">
<!-- Left Pane: Branding & Visuals (Editorial Authority) -->
<div class="hidden md:flex flex-col justify-between bg-surface-container p-12 relative overflow-hidden group">
<div class="absolute inset-0 z-0">
<img alt="High-end modern office interior with subtle lighting, deep shadows, and professional architecture, signaling trust and stability." class="w-full h-full object-cover opacity-60 mix-blend-multiply grayscale contrast-125" data-alt="High-end modern office interior with subtle lighting, deep shadows, and professional architecture, signaling trust and stability." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDG52X1zZkZ3vZ9Ekl0BzFA7SnagwIu4CIkSWdDNFCaHFkw29y8YdcPqYX79QEw8cGECgGBzx129cORc73gx3wzeEKGoDn3-WY-qTmDohEXxE-HaDfN2-tuPzYUEPqz8qqjnENYIxteGIUqpTwbjfCdFpE8ROJK9aS-LlcOcOs8VLk9nToQYHGaLKxc0V7Cm_adlaAUlxodnHNNNq-cBPGnTnZyovWhgq4W4ZBm3b3EJgHVR34D7LEl2uj4dBjnj30tnsCbAZRLFOc"/>
</div>
<div class="relative z-10">
<h1 class="font-headline font-extrabold text-4xl text-primary tracking-tight mb-4">HireMate</h1>
<p class="font-body text-on-surface-variant text-sm font-medium leading-relaxed max-w-sm">Recruitment Screening &amp;<br/>Candidate Review Workbench</p>
</div>
<div class="relative z-10 mt-auto">
<div class="inline-flex items-center gap-2 px-3 py-1.5 bg-surface-container-lowest/80 backdrop-blur-md rounded-sm border border-outline-variant/15">
<span class="material-symbols-outlined text-[16px] text-primary" data-icon="shield_person">shield_person</span>
<span class="font-label text-xs uppercase tracking-[0.05em] text-on-surface-variant">Secure Environment</span>
</div>
</div>
</div>
<!-- Right Pane: Interaction Zone (Terminal Style) -->
<div class="p-8 md:p-12 flex flex-col justify-center bg-surface-container-lowest">
<div class="mb-10">
<h2 class="font-headline font-bold text-2xl text-on-surface mb-2">Access Workbench</h2>
<p class="font-body text-sm text-on-surface-variant">Enter your credentials to continue.</p>
</div>
<!-- Error State (Risk Signal) -->
<div class="mb-6 flex items-start gap-3 bg-error-container p-3 rounded-sm border-l-2 border-[#ba1a1a]">
<span class="material-symbols-outlined text-[#93000a] mt-0.5 text-lg" data-icon="error">error</span>
<p class="font-body text-sm text-[#93000a] font-medium">Authentication failed. Please verify your email and password.</p>
</div>
<form class="space-y-5" onsubmit="event.preventDefault();">
<div class="space-y-1.5">
<label class="block font-label text-xs uppercase tracking-[0.05em] text-on-surface-variant" for="email">Corporate Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[18px]" data-icon="mail">mail</span>
</span>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-high border-none text-on-surface font-body text-sm rounded-sm focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:outline-none transition-colors placeholder:text-outline/70" id="email" name="email" required="" type="email" value="recruiter@enterprise.com"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex items-center justify-between">
<label class="block font-label text-xs uppercase tracking-[0.05em] text-on-surface-variant" for="password">Password</label>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[18px]" data-icon="lock">lock</span>
</span>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-high border-none text-on-surface font-body text-sm rounded-sm focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:outline-none transition-colors placeholder:text-outline/70" id="password" name="password" required="" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full flex items-center justify-center py-2.5 px-4 bg-primary text-on-primary font-body text-sm font-semibold rounded-md hover:bg-primary-container transition-colors shadow-[inset_0_1px_0_rgba(255,255,255,0.1)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                        Initialize Session
                    </button>
</div>
</form>
<!-- System Status Indicator -->
<div class="mt-8 flex items-center justify-center gap-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
</span>
<span class="font-body text-xs text-on-surface-variant">System Status: Mainline Connected</span>
</div>
</div>
</main>
</body></html>
