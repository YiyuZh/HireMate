[Definition]
# Caddy JSON access logs for failed Basic Auth attempts on:
# - https://blog.zenithy.art/admin...
# - /api/admin/messages...
#
# The log file is written by the hiremate-caddy container to:
# /opt/apps/hiremate/logs/caddy/access.log
failregex = ^\{(?=.*"request":\{)(?=.*"remote_ip":"<HOST>")(?=.*"host":"blog\.zenithy\.art")(?=.*"uri":"/admin(?:[/?][^"]*)?")(?=.*"status":401).*$
            ^\{(?=.*"request":\{)(?=.*"remote_ip":"<HOST>")(?=.*"uri":"/api/admin/messages(?:[^"]*)?")(?=.*"status":401).*$

ignoreregex =
